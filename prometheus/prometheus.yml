global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Сбор метрик с самого Prometheus
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  
  # Сбор метрик с MQTT экспортера
  - job_name: 'mqtt-exporter'
    static_configs:
      - targets: ['mqtt-exporter:8000']
  
  # Node exporter (метрики сервера)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']